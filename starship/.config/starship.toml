"$schema" = 'https://starship.rs/config-schema.json'
add_newline = true 

format = """
${python}\
$time\
$directory\
$git_branch\
$git_status
\n$character"""

[directory]
style = "cyan"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "purple"

[git_status]
style = "yellow"

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[hostname]
ssh_only = true
style = "bold yellow"

[username]
show_always = true
style_user = "blue"
format = '[ $user ]($style)'

[time]
disabled = false
format = "[$time]($style) "
time_format = "%R"

[status]
disabled = false
style = "red"

[os]
disabled = false
style = "bold white"

[python]
format = 'via [${symbol}${version}](bold green) [(\($virtualenv\))](bold yellow) '
style = "bold green"
symbol = " "
